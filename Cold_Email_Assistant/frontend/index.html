<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cold Email Assistant</title>

<!--
  Single-file dashboard for the LangGraph cold-email workflow. No build step
  on purpose - React/ReactDOM/Babel are pulled from CDNs so this runs by
  just letting server.py serve this directory as static files (recommended,
  same-origin, zero CORS setup) or via any plain static file server.

  If you serve this file separately from the API (e.g. a Vite dev server),
  set API_BASE below to the API's origin and add that origin to
  ALLOWED_ORIGINS in your .env.
-->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  /* Small custom scrollbar + font tweaks Tailwind's CDN build doesn't cover */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; }
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

// =============================================================================
// Config
// =============================================================================

// Empty string = same-origin (recommended: server.py mounts this directory).
// Point this at "http://localhost:8000" if you're serving the frontend from
// a separate dev server instead.
const API_BASE = "";

function wsUrlFor(threadId) {
  const base = API_BASE || `${window.location.protocol}//${window.location.host}`;
  return `${base.replace(/^http/, "ws")}/ws/campaigns/${threadId}`;
}

// =============================================================================
// Icons (hand-rolled, lucide-style outline SVGs - no extra CDN dependency)
// =============================================================================

const iconProps = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" };

const CheckCircleIcon = ({ className = "w-5 h-5" }) => (
  <svg className={className} {...iconProps}><circle cx="12" cy="12" r="9" /><path d="M8.5 12.5l2.5 2.5 5-5" /></svg>
);
const XCircleIcon = ({ className = "w-5 h-5" }) => (
  <svg className={className} {...iconProps}><circle cx="12" cy="12" r="9" /><path d="M9 9l6 6M15 9l-6 6" /></svg>
);
const EditIcon = ({ className = "w-5 h-5" }) => (
  <svg className={className} {...iconProps}><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" /></svg>
);
const SendIcon = ({ className = "w-5 h-5" }) => (
  <svg className={className} {...iconProps}><path d="M22 2 11 13" /><path d="M22 2 15 22l-4-9-9-4Z" /></svg>
);
const MailIcon = ({ className = "w-5 h-5" }) => (
  <svg className={className} {...iconProps}><rect x="3" y="5" width="18" height="14" rx="2" /><path d="m3 7 9 6 9-6" /></svg>
);
const SearchIcon = ({ className = "w-5 h-5" }) => (
  <svg className={className} {...iconProps}><circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" /></svg>
);
const UsersIcon = ({ className = "w-5 h-5" }) => (
  <svg className={className} {...iconProps}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>
);
const LoaderIcon = ({ className = "w-5 h-5" }) => (
  <svg className={`${className} animate-spin`} {...iconProps}><path d="M12 2a10 10 0 1 0 10 10" /></svg>
);
const AlertTriangleIcon = ({ className = "w-5 h-5" }) => (
  <svg className={className} {...iconProps}><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" /><path d="M12 9v4" /><path d="M12 17h.01" /></svg>
);
const RefreshIcon = ({ className = "w-5 h-5" }) => (
  <svg className={className} {...iconProps}><path d="M3 12a9 9 0 0 1 15-6.7L21 8" /><path d="M21 3v5h-5" /><path d="M21 12a9 9 0 0 1-15 6.7L3 16" /><path d="M3 21v-5h5" /></svg>
);
const ClockIcon = ({ className = "w-5 h-5" }) => (
  <svg className={className} {...iconProps}><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 3" /></svg>
);
const BuildingIcon = ({ className = "w-5 h-5" }) => (
  <svg className={className} {...iconProps}><rect x="4" y="2" width="16" height="20" rx="1" /><path d="M9 22v-4h6v4M8 6h.01M12 6h.01M16 6h.01M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h.01" /></svg>
);
const PlusIcon = ({ className = "w-5 h-5" }) => (
  <svg className={className} {...iconProps}><path d="M12 5v14M5 12h14" /></svg>
);

// =============================================================================
// API client
// =============================================================================

async function apiFetch(path, options = {}) {
  let response;
  try {
    response = await fetch(`${API_BASE}${path}`, {
      headers: { "Content-Type": "application/json", ...(options.headers || {}) },
      ...options,
    });
  } catch (networkErr) {
    throw new Error("Can't reach the API server. Is server.py running on the expected host/port?");
  }

  let body = null;
  try {
    body = await response.json();
  } catch {
    // No JSON body (e.g. an empty response) - not necessarily an error.
  }

  if (!response.ok) {
    const detail = body && body.detail ? body.detail : `Request failed (HTTP ${response.status})`;
    throw new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
  }
  return body;
}

// =============================================================================
// Execution timeline
// =============================================================================

const TIMELINE_STEPS = [
  { key: "enrich_lead_node", label: "Enrichment", icon: SearchIcon },
  { key: "generate_draft_node", label: "Drafting", icon: EditIcon },
  { key: "human_review_gate", label: "Human Review", icon: UsersIcon },
  { key: "send_email_node", label: "Gmail Dispatch", icon: SendIcon },
  { key: "check_reply_node", label: "Reply Classification", icon: MailIcon },
];

// Fills in a reasonable "completed steps" set from the settled status alone,
// so the timeline still looks right immediately after a page refresh - the
// live, node-by-node ticking (via WebSocket) only covers steps that complete
// while this tab is actively connected.
function stepsCompletedForStatus(status) {
  const done = new Set();
  if (status === "awaiting_review") {
    done.add("enrich_lead_node").add("generate_draft_node");
  } else if (["completed", "failed", "rejected"].includes(status)) {
    done.add("enrich_lead_node").add("generate_draft_node").add("human_review_gate");
    if (status === "completed") {
      done.add("send_email_node").add("check_reply_node");
    } else if (status === "failed") {
      done.add("send_email_node");
    }
  }
  return done;
}

function ExecutionTimeline({ completedSteps, status }) {
  return (
    <div className="flex items-center gap-1 sm:gap-2 overflow-x-auto pb-1">
      {TIMELINE_STEPS.map((step, idx) => {
        const isDone = completedSteps.has(step.key);
        const isRejectedSkip = status === "rejected" && !isDone && idx >= 3;
        const Icon = step.icon;
        return (
          <React.Fragment key={step.key}>
            <div className="flex flex-col items-center gap-1 min-w-[86px]">
              <div
                className={
                  "w-9 h-9 rounded-full flex items-center justify-center border-2 transition-colors " +
                  (isDone
                    ? "bg-emerald-500/15 border-emerald-500 text-emerald-400"
                    : isRejectedSkip
                    ? "bg-slate-800 border-slate-700 text-slate-600"
                    : "bg-slate-800 border-slate-700 text-slate-400")
                }
              >
                <Icon className="w-4 h-4" />
              </div>
              <span className={"text-[11px] text-center leading-tight " + (isDone ? "text-emerald-400" : "text-slate-500")}>
                {step.label}
              </span>
            </div>
            {idx < TIMELINE_STEPS.length - 1 && (
              <div className={"h-0.5 w-4 sm:w-8 shrink-0 " + (isDone ? "bg-emerald-500/50" : "bg-slate-800")} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

// =============================================================================
// Small presentational helpers
// =============================================================================

function Badge({ children, className = "" }) {
  return (
    <span className={"inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium border " + className}>
      {children}
    </span>
  );
}

const REPLY_STATUS_STYLE = {
  HOT_LEAD: { label: "Hot Lead", classes: "bg-emerald-500/15 text-emerald-400 border-emerald-500/30" },
  NOT_INTERESTED: { label: "Not Interested", classes: "bg-rose-500/15 text-rose-400 border-rose-500/30" },
  OUT_OF_OFFICE: { label: "Out of Office", classes: "bg-amber-500/15 text-amber-400 border-amber-500/30" },
  NO_REPLY: { label: "No Reply Yet", classes: "bg-slate-500/15 text-slate-400 border-slate-500/30" },
};

function Card({ title, icon, children, className = "" }) {
  const Icon = icon;
  return (
    <div className={"bg-slate-900 border border-slate-800 rounded-xl p-4 sm:p-5 " + className}>
      {title && (
        <div className="flex items-center gap-2 mb-3 text-slate-300">
          {Icon && <Icon className="w-4 h-4" />}
          <h3 className="text-sm font-semibold uppercase tracking-wide">{title}</h3>
        </div>
      )}
      {children}
    </div>
  );
}

function ErrorBanner({ message, onDismiss }) {
  if (!message) return null;
  return (
    <div className="flex items-start gap-2 bg-rose-500/10 border border-rose-500/30 text-rose-300 rounded-lg px-4 py-3 text-sm">
      <AlertTriangleIcon className="w-4 h-4 mt-0.5 shrink-0" />
      <div className="flex-1">{message}</div>
      <button onClick={onDismiss} className="text-rose-400 hover:text-rose-200">
        <XCircleIcon className="w-4 h-4" />
      </button>
    </div>
  );
}

// =============================================================================
// New campaign form
// =============================================================================

function NewCampaignForm({ onCreated, onError, busy, setBusy }) {
  const [form, setForm] = useState({ first_name: "", last_name: "", lead_email: "", company_name: "", title: "" });

  const update = (field) => (e) => setForm((f) => ({ ...f, [field]: e.target.value }));

  const submit = async (e) => {
    e.preventDefault();
    setBusy(true);
    try {
      const state = await apiFetch("/api/campaigns/start", { method: "POST", body: JSON.stringify(form) });
      setForm({ first_name: "", last_name: "", lead_email: "", company_name: "", title: "" });
      onCreated(state);
    } catch (err) {
      onError(err.message);
    } finally {
      setBusy(false);
    }
  };

  const inputClasses = "w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500";

  return (
    <form onSubmit={submit} className="space-y-3">
      <div className="grid grid-cols-2 gap-3">
        <input required placeholder="First name" value={form.first_name} onChange={update("first_name")} className={inputClasses} />
        <input required placeholder="Last name" value={form.last_name} onChange={update("last_name")} className={inputClasses} />
      </div>
      <input required type="email" placeholder="Lead email" value={form.lead_email} onChange={update("lead_email")} className={inputClasses} />
      <input required placeholder="Company name" value={form.company_name} onChange={update("company_name")} className={inputClasses} />
      <input placeholder="Job title (optional)" value={form.title} onChange={update("title")} className={inputClasses} />
      <button
        type="submit"
        disabled={busy}
        className="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 disabled:bg-indigo-900 disabled:text-slate-500 transition-colors text-white font-medium rounded-lg px-4 py-2.5 text-sm"
      >
        {busy ? <LoaderIcon className="w-4 h-4" /> : <PlusIcon className="w-4 h-4" />}
        {busy ? "Enriching + drafting..." : "Launch Campaign"}
      </button>
    </form>
  );
}

// =============================================================================
// Human review center
// =============================================================================

function ReviewCenter({ campaignState, onAction, onError }) {
  const [editing, setEditing] = useState(false);
  const [feedback, setFeedback] = useState("");
  const [actionBusy, setActionBusy] = useState(null); // "approve" | "reject" | "edit" | null

  const { lead, enrichment, draft, generation_attempts, thread_id } = campaignState;

  const runAction = async (kind, path, body) => {
    setActionBusy(kind);
    try {
      const updated = await apiFetch(`/api/campaigns/${thread_id}/${path}`, {
        method: "POST",
        body: body ? JSON.stringify(body) : undefined,
      });
      onAction(updated);
      setEditing(false);
      setFeedback("");
    } catch (err) {
      onError(err.message);
    } finally {
      setActionBusy(null);
    }
  };

  return (
    <div className="space-y-4">
      <Card title="Target Recipient" icon={UsersIcon}>
        <div className="grid sm:grid-cols-2 gap-x-6 gap-y-1 text-sm">
          <div><span className="text-slate-500">Name</span> — {lead.full_name}</div>
          <div><span className="text-slate-500">Email</span> — {lead.email}</div>
          <div><span className="text-slate-500">Company</span> — {lead.company_name}</div>
          <div><span className="text-slate-500">Title</span> — {lead.title || "—"}</div>
        </div>
      </Card>

      {enrichment && (
        <Card title="Company Signals" icon={BuildingIcon}>
          <div className="space-y-2 text-sm">
            <div className="flex flex-wrap gap-1.5 items-center">
              <span className="text-slate-500 text-xs mr-1">Tech stack:</span>
              {(enrichment.tech_stack || []).map((t) => (
                <Badge key={t} className="bg-sky-500/15 text-sky-400 border-sky-500/30">{t}</Badge>
              ))}
            </div>
            <div className="flex flex-wrap gap-1.5 items-center">
              <span className="text-slate-500 text-xs mr-1">Hiring:</span>
              {(enrichment.open_roles || []).map((r) => (
                <Badge key={r} className="bg-violet-500/15 text-violet-400 border-violet-500/30">{r}</Badge>
              ))}
            </div>
            {(enrichment.recent_news || []).length > 0 && (
              <div className="flex flex-wrap gap-1.5 items-center">
                <span className="text-slate-500 text-xs mr-1">News:</span>
                {enrichment.recent_news.map((n) => (
                  <Badge key={n} className="bg-amber-500/15 text-amber-400 border-amber-500/30">{n}</Badge>
                ))}
              </div>
            )}
            <div className="text-xs text-slate-500 pt-1">
              {enrichment.industry && <>Industry: {enrichment.industry} · </>}
              {enrichment.company_size && <>Size: {enrichment.company_size} · </>}
              Source: {enrichment.source}
            </div>
          </div>
        </Card>
      )}

      <Card
        title={`Drafted Email · ${draft.word_count} words · attempt #${generation_attempts}`}
        icon={EditIcon}
      >
        <div className="text-sm space-y-2">
          <div><span className="text-slate-500">Subject —</span> <span className="font-semibold">{draft.subject}</span></div>
          <div className="whitespace-pre-wrap text-slate-200 bg-slate-950 border border-slate-800 rounded-lg p-3">{draft.body}</div>
        </div>
      </Card>

      {!editing ? (
        <div className="flex flex-wrap gap-3">
          <button
            onClick={() => runAction("approve", "approve")}
            disabled={actionBusy !== null}
            className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white font-medium rounded-lg px-4 py-2.5 text-sm"
          >
            {actionBusy === "approve" ? <LoaderIcon className="w-4 h-4" /> : <CheckCircleIcon className="w-4 h-4" />}
            Approve &amp; Deliver
          </button>
          <button
            onClick={() => setEditing(true)}
            disabled={actionBusy !== null}
            className="flex items-center gap-2 bg-amber-600 hover:bg-amber-500 disabled:opacity-50 text-white font-medium rounded-lg px-4 py-2.5 text-sm"
          >
            <EditIcon className="w-4 h-4" />
            Request Revision
          </button>
          <button
            onClick={() => runAction("reject", "reject")}
            disabled={actionBusy !== null}
            className="flex items-center gap-2 bg-rose-600 hover:bg-rose-500 disabled:opacity-50 text-white font-medium rounded-lg px-4 py-2.5 text-sm"
          >
            {actionBusy === "reject" ? <LoaderIcon className="w-4 h-4" /> : <XCircleIcon className="w-4 h-4" />}
            Reject
          </button>
        </div>
      ) : (
        <Card className="border-amber-500/30">
          <label className="text-xs text-slate-400">What should change?</label>
          <textarea
            autoFocus
            value={feedback}
            onChange={(e) => setFeedback(e.target.value)}
            placeholder='e.g. "Make it more casual" or "Focus more on our Kafka integration"'
            rows={3}
            className="w-full mt-1 bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-500"
          />
          <div className="flex gap-2 mt-3">
            <button
              onClick={() => runAction("edit", "edit", { feedback })}
              disabled={!feedback.trim() || actionBusy !== null}
              className="flex items-center gap-2 bg-amber-600 hover:bg-amber-500 disabled:opacity-50 text-white font-medium rounded-lg px-4 py-2 text-sm"
            >
              {actionBusy === "edit" ? <LoaderIcon className="w-4 h-4" /> : <EditIcon className="w-4 h-4" />}
              Submit Revision
            </button>
            <button
              onClick={() => { setEditing(false); setFeedback(""); }}
              disabled={actionBusy !== null}
              className="bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium rounded-lg px-4 py-2 text-sm"
            >
              Cancel
            </button>
          </div>
        </Card>
      )}
    </div>
  );
}

// =============================================================================
// Result summary (post-delivery / rejected / failed)
// =============================================================================

function ResultSummary({ campaignState, onAction, onError }) {
  const [checkingReply, setCheckingReply] = useState(false);
  const { status, thread_id, delivery_mode, gmail_draft_id, gmail_message_id, gmail_thread_id, reply_status, reply_text, send_error, errors } = campaignState;

  const checkReply = async () => {
    setCheckingReply(true);
    try {
      const updated = await apiFetch(`/api/campaigns/${thread_id}/reply`);
      onAction(updated);
    } catch (err) {
      onError(err.message);
    } finally {
      setCheckingReply(false);
    }
  };

  const headline = {
    completed: { text: delivery_mode === "draft" ? "Gmail draft created" : "Email sent", icon: CheckCircleIcon, classes: "text-emerald-400" },
    failed: { text: "Delivery failed", icon: XCircleIcon, classes: "text-rose-400" },
    rejected: { text: "Draft rejected — nothing delivered", icon: XCircleIcon, classes: "text-slate-400" },
  }[status] || { text: status, icon: ClockIcon, classes: "text-slate-400" };

  const HeadlineIcon = headline.icon;
  const replyStyle = REPLY_STATUS_STYLE[reply_status] || REPLY_STATUS_STYLE.NO_REPLY;

  return (
    <Card>
      <div className={"flex items-center gap-2 text-lg font-semibold mb-3 " + headline.classes}>
        <HeadlineIcon className="w-5 h-5" />
        {headline.text}
      </div>

      {status === "completed" && (
        <div className="text-sm space-y-1 text-slate-400 mb-4">
          {gmail_draft_id && <div>Draft ID: <span className="text-slate-300">{gmail_draft_id}</span></div>}
          {gmail_message_id && <div>Message ID: <span className="text-slate-300">{gmail_message_id}</span></div>}
          {gmail_thread_id && <div>Thread ID: <span className="text-slate-300">{gmail_thread_id}</span></div>}
        </div>
      )}

      {status === "failed" && send_error && (
        <div className="text-sm text-rose-300 bg-rose-500/10 border border-rose-500/30 rounded-lg p-3 mb-3">{send_error}</div>
      )}

      {status === "completed" && delivery_mode === "send" && (
        <div className="border-t border-slate-800 pt-3 mt-1">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs uppercase tracking-wide text-slate-500">Reply status</span>
            <button
              onClick={checkReply}
              disabled={checkingReply}
              className="flex items-center gap-1.5 text-xs text-indigo-400 hover:text-indigo-300 disabled:opacity-50"
            >
              {checkingReply ? <LoaderIcon className="w-3.5 h-3.5" /> : <RefreshIcon className="w-3.5 h-3.5" />}
              Check for reply
            </button>
          </div>
          <Badge className={replyStyle.classes}>{replyStyle.label}</Badge>
          {reply_text && (
            <p className="text-sm text-slate-300 italic border-l-2 border-slate-700 pl-3 mt-3">{reply_text}</p>
          )}
        </div>
      )}

      {errors && errors.length > 0 && (
        <div className="text-xs text-slate-500 border-t border-slate-800 pt-3 mt-3">
          <div className="mb-1">Non-fatal issues encountered:</div>
          <ul className="list-disc list-inside space-y-0.5">
            {errors.map((e, i) => <li key={i}>{e}</li>)}
          </ul>
        </div>
      )}
    </Card>
  );
}

// =============================================================================
// Campaign sidebar
// =============================================================================

function CampaignSidebar({ campaigns, selectedId, onSelect }) {
  return (
    <div className="space-y-1.5 max-h-80 overflow-y-auto pr-1">
      {campaigns.length === 0 && <p className="text-sm text-slate-500">No campaigns yet.</p>}
      {campaigns.map((c) => (
        <button
          key={c.thread_id}
          onClick={() => onSelect(c.thread_id)}
          className={
            "w-full text-left px-3 py-2 rounded-lg text-sm transition-colors " +
            (c.thread_id === selectedId ? "bg-indigo-600/20 border border-indigo-500/40 text-indigo-200" : "hover:bg-slate-800 border border-transparent text-slate-300")
          }
        >
          <div className="font-medium truncate">{c.lead_name}</div>
          <div className="text-xs text-slate-500 truncate">{c.company_name}</div>
        </button>
      ))}
    </div>
  );
}

// =============================================================================
// App
// =============================================================================

function App() {
  const [campaigns, setCampaigns] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [campaignState, setCampaignState] = useState(null);
  const [completedSteps, setCompletedSteps] = useState(new Set());
  const [errorMessage, setErrorMessage] = useState(null);
  const [formBusy, setFormBusy] = useState(false);
  const [health, setHealth] = useState(null);
  const wsRef = useRef(null);

  const refreshCampaignList = useCallback(async () => {
    try {
      const list = await apiFetch("/api/campaigns");
      setCampaigns(list);
    } catch (err) {
      setErrorMessage(err.message);
    }
  }, []);

  useEffect(() => {
    refreshCampaignList();
    apiFetch("/api/health").then(setHealth).catch(() => {});
  }, [refreshCampaignList]);

  // Connects (or reconnects) the live-timeline socket for a given thread.
  // Node-completion events push into `completedSteps` so the timeline ticks
  // forward in real time during approve/edit/reply-check calls.
  const connectSocket = useCallback((threadId) => {
    if (wsRef.current) {
      wsRef.current.close();
    }
    const socket = new WebSocket(wsUrlFor(threadId));
    socket.onmessage = (event) => {
      const payload = JSON.parse(event.data);
      if (payload.type === "node_complete") {
        setCompletedSteps((prev) => new Set(prev).add(payload.node));
      }
    };
    wsRef.current = socket;
  }, []);

  useEffect(() => () => wsRef.current && wsRef.current.close(), []);

  const applyState = (state) => {
    setCampaignState(state);
    setCompletedSteps((prev) => new Set([...prev, ...stepsCompletedForStatus(state.status)]));
  };

  const onCampaignCreated = (state) => {
    setSelectedId(state.thread_id);
    setCompletedSteps(stepsCompletedForStatus(state.status));
    setCampaignState(state);
    connectSocket(state.thread_id); // live events for whatever the user does *next* (approve/edit/etc.)
    refreshCampaignList();
  };

  const selectCampaign = async (threadId) => {
    setSelectedId(threadId);
    setErrorMessage(null);
    connectSocket(threadId);
    try {
      const state = await apiFetch(`/api/campaigns/${threadId}/state`);
      setCompletedSteps(stepsCompletedForStatus(state.status));
      setCampaignState(state);
    } catch (err) {
      setErrorMessage(err.message);
    }
  };

  const onAction = (state) => {
    applyState(state);
    refreshCampaignList();
  };

  return (
    <div className="max-w-6xl mx-auto px-4 sm:px-6 py-6 space-y-5">
      <header className="flex items-center justify-between">
        <div>
          <h1 className="text-xl font-bold tracking-tight">Cold Email Assistant</h1>
          <p className="text-sm text-slate-500">LangGraph human-in-the-loop dashboard</p>
        </div>
        {health && (
          <div className="text-xs text-slate-500 text-right">
            <div>{health.dry_run ? "DRY RUN mode" : "Live mode"}</div>
            <div>Delivery: {health.delivery_mode}</div>
          </div>
        )}
      </header>

      <ErrorBanner message={errorMessage} onDismiss={() => setErrorMessage(null)} />

      <div className="grid lg:grid-cols-[280px_1fr] gap-5">
        <aside className="space-y-5">
          <Card title="New Campaign" icon={PlusIcon}>
            <NewCampaignForm onCreated={onCampaignCreated} onError={setErrorMessage} busy={formBusy} setBusy={setFormBusy} />
          </Card>
          <Card title="Campaigns" icon={BuildingIcon}>
            <CampaignSidebar campaigns={campaigns} selectedId={selectedId} onSelect={selectCampaign} />
          </Card>
        </aside>

        <main className="space-y-5">
          {!campaignState ? (
            <Card className="text-center py-16 text-slate-500">
              Launch a campaign or select one from the sidebar to get started.
            </Card>
          ) : (
            <>
              <Card title="Live Execution Timeline" icon={ClockIcon}>
                <ExecutionTimeline completedSteps={completedSteps} status={campaignState.status} />
              </Card>

              {campaignState.status === "awaiting_review" && (
                <ReviewCenter campaignState={campaignState} onAction={onAction} onError={setErrorMessage} />
              )}

              {["completed", "failed", "rejected"].includes(campaignState.status) && (
                <ResultSummary campaignState={campaignState} onAction={onAction} onError={setErrorMessage} />
              )}
            </>
          )}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
